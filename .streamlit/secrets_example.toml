# Copy this file to .streamlit/secrets.toml for local use.
# Do NOT commit secrets.toml to GitHub.

# Evaluator protection
EVALUATOR_USERNAME = "evaluator"
ADMIN_PASSWORD = "change-this-strong-password"
# Optional stronger alternative: generate a password hash with:
# python make_password_hash.py
# EVALUATOR_PASSWORD_HASH = "pbkdf2_sha256$..."

# Optional: protect public student registration with a study access code.
# If empty or omitted, anyone with the platform link can create a student account.
REGISTRATION_ACCESS_CODE = "qai-study-2026"

# Optional: persistent cloud database for deployment.
# Recommended for Streamlit Cloud: PostgreSQL from Neon/Supabase/Render/Railway.
# DATABASE_URL = "postgresql+psycopg2://USER:PASSWORD@HOST:5432/DBNAME?sslmode=require"

# LLM provider: groq, gemini, openai, or local
# Recommended free/trial option for this project: Groq
LLM_PROVIDER = "groq"
GROQ_API_KEY = "paste-your-new-groq-key-here"
GROQ_MODEL = "llama-3.1-8b-instant"
GROQ_BASE_URL = "https://api.groq.com/openai/v1"

# Alternative Gemini setup
# LLM_PROVIDER = "gemini"
# GEMINI_API_KEY = "paste-your-new-gemini-key-here"
# GEMINI_MODEL = "gemini-2.0-flash"

# Alternative OpenAI-compatible setup
# LLM_PROVIDER = "openai"
# OPENAI_API_KEY = "sk-..."
# OPENAI_MODEL = "gpt-4o-mini"
# OPENAI_BASE_URL = "https://api.openai.com/v1"
